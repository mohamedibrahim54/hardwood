name: Release CLI

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Release version (must have an existing tag v<version>)'
        required: true
  workflow_call:
    inputs:
      release-version:
        description: 'Release version (must have an existing tag v<version>)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 'Verify GitHub release exists'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "v${{ inputs.release-version }}" &>/dev/null; then
            echo "Error: no GitHub release found for v${{ inputs.release-version }}"
            exit 1
          fi

  package:
    needs: validate
    name: 'Build with Graal on ${{ matrix.os }}'
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-26-intel, macos-26, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          ref: v${{ inputs.release-version }}
          submodules: 'true'

      - name: 'Add Developer Command Prompt for Microsoft Visual C++'
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1 — https://github.com/ilammy/msvc-dev-cmd/releases/tag/v1

      - name: 'Set up Graal'
        uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085  # v1 — https://github.com/graalvm/setup-graalvm/releases/tag/v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: 'Build Native Image'
        run: ./mvnw -ntp -B -Dnative package -pl :hardwood-error-prone-checks,:hardwood-cli -am -DskipTests "-Ddist.qualifier=${{ inputs.release-version }}"

      - name: 'Upload build artifact (tar.gz)'
        if: ${{ runner.os != 'Windows' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: artifacts-${{ runner.os }}-${{ runner.arch }}
          path: cli/target/*.tar.gz

      - name: 'Upload build artifact (zip)'
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: artifacts-${{ runner.os }}-${{ runner.arch }}
          path: cli/target/*.zip

  release-cli:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Download all build artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: 'Attach CLI binaries to release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${{ inputs.release-version }}" artifacts/*

  docker:
    needs: package
    name: 'Build Docker image (${{ matrix.arch }})'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: artifacts-Linux-X64
            arch: amd64
          - runner: ubuntu-24.04-arm
            artifact: artifacts-Linux-ARM64
            arch: arm64
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          ref: v${{ inputs.release-version }}
          submodules: 'true'

      - name: 'Download Linux artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          name: ${{ matrix.artifact }}
          path: linux-artifact

      - name: 'Extract binary, completion script and codec libraries from tarball'
        run: |
          mkdir -p cli/target cli/target/native-libs
          tar -xzf linux-artifact/*.tar.gz --wildcards --strip-components=2 \
            -C cli/target \
            '*/bin/hardwood' '*/bin/hardwood_completion'
          mv cli/target/hardwood cli/target/hardwood-cli
          # Codec native libraries (zstd/snappy/lz4) live under lib/ in the dist;
          # the Dockerfile copies them to /usr/local/lib so the loader finds them.
          tar -xzf linux-artifact/*.tar.gz --wildcards --strip-components=2 \
            -C cli/target/native-libs \
            '*/lib/*'

      - name: 'Log in to GitHub Container Registry'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0 — https://github.com/docker/login-action/releases/tag/v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0 — https://github.com/docker/setup-buildx-action/releases/tag/v3.12.0

      # Push by digest only (no per-arch tag); the manifest job stitches the
      # digests into the user-facing tags so no intermediate tags are published.
      - name: 'Build and push image by digest'
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2 — https://github.com/docker/build-push-action/releases/tag/v6.19.2
        with:
          context: cli
          file: cli/docker/Dockerfile
          provenance: false
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: 'Export digest'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: 'Upload digest'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 'Download digests'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: 'Log in to GitHub Container Registry'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0 — https://github.com/docker/login-action/releases/tag/v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0 — https://github.com/docker/setup-buildx-action/releases/tag/v3.12.0

      - name: 'Create and push multi-arch manifest'
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:${{ inputs.release-version }} \
            --tag ghcr.io/${{ github.repository }}:latest \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
