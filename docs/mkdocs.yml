site_name: Hardwood
site_description: A lightweight Java Parquet reader — zero transitive dependencies, GraalVM-friendly, S3 without Hadoop
site_url: https://hardwood.dev/
repo_url: https://github.com/hardwood-hq/hardwood
repo_name: hardwood-hq/hardwood
edit_uri: edit/main/docs/content/

docs_dir: content

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorial:
    - Read Your First Parquet File: tutorial/first-read.md
  - How-to Guides:
    - Overview: how-to/index.md
    - Read Row by Row: how-to/row-reader.md
    - Read Column by Column: how-to/column-reader.md
    - Filter, Project, Limit, and Split: how-to/query-controls.md
    - Read Multiple Files as One Dataset: how-to/multi-file.md
    - Read into Avro GenericRecords: how-to/avro.md
    - Read from S3: how-to/s3.md
    - Read with the parquet-java API: how-to/compat.md
    - Read Variant Columns: how-to/variant.md
    - Read Geospatial Columns: how-to/geospatial.md
    - Inspect File Metadata: how-to/metadata.md
  - Concepts:
    - How a Parquet File Is Laid Out: concepts/parquet-layout.md
    - The Concurrency Model: concepts/concurrency-model.md
    - RowReader vs. ColumnReader: concepts/reader-models.md
    - The Layer Model: concepts/nested-columns.md
    - Row Selection: concepts/row-selection.md
    - Timestamp Semantics: concepts/timestamps.md
    - Compatibility Philosophy: concepts/compatibility-philosophy.md
  - Reference:
    - Configuration: reference/configuration.md
    - Typed Accessors: reference/accessors.md
    - Query Controls: reference/query-controls.md
    - S3: reference/s3.md
    - Error Handling: reference/error-handling.md
    - CLI: reference/cli.md
    - Package Structure: reference/packages.md
    - API (JavaDoc): /api/latest/
  - Contributing: contributing.md
  - Release Notes: release-notes.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/hardwood-with-text.svg
  favicon: assets/hardwood.svg
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

hooks:
  - hooks/git_commit.py
  - hooks/page_variables.py

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

copyright: >-
  Licensed under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">Creative Commons BY-SA 4.0</a>

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  version:
    provider: mike
    alias: true
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hardwood-hq/hardwood
  # Latest released version, substituted into Maven/Gradle examples in the
  # docs via the {{hardwood_version}} placeholder. Updated by release.sh.
  hardwood_version: 1.0.0.CR1
  # GitHub release tag the CLI download link points at. Updated by release.sh
  # for the tagged docs build; main keeps it at the rolling early-access tag.
  cli_release_tag: 1.0-early-access
